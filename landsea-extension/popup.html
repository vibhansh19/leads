<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LandSea</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 420px;
      background: #09090B;
      color: #FAFAFA;
      font-family: 'Geist', -apple-system, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1F1F23;
    }

    .logo { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; letter-spacing: -0.02em; }
    .logo-sq { width: 22px; height: 22px; background: #FAFAFA; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #09090B; font-weight: 800; }
    .open-btn { font-size: 10px; color: #52525B; background: transparent; border: 1px solid #27272A; border-radius: 5px; padding: 3px 8px; cursor: pointer; font-family: inherit; transition: all .12s; text-decoration: none; display: flex; align-items: center; }
    .open-btn:hover { border-color: #3F3F46; color: #A1A1AA; }

    /* FORM */
    .form { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    .field-label { font-size: 10px; font-weight: 600; color: #52525B; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; display: block; }

    .field-wrap { position: relative; }
    .field-wrap select, .field-wrap input {
      width: 100%; height: 36px; padding: 0 28px 0 10px;
      background: #111113; border: 1px solid #27272A;
      border-radius: 8px; color: #FAFAFA;
      font-family: inherit; font-size: 12px;
      outline: none; appearance: none; -webkit-appearance: none;
      transition: border-color .15s;
    }
    .field-wrap input { padding-right: 10px; }
    .field-wrap select:focus, .field-wrap input:focus { border-color: #3F3F46; }
    .field-wrap input::placeholder { color: #3F3F46; }
    .arr { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: #52525B; font-size: 8px; pointer-events: none; }

    .count-row { display: flex; align-items: center; gap: 5px; }
    .count-lbl { font-size: 10px; font-weight: 600; color: #52525B; letter-spacing: .08em; text-transform: uppercase; margin-right: 4px; }
    .count-btn { width: 32px; height: 32px; border-radius: 7px; border: 1px solid #27272A; background: #111113; color: #A1A1AA; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .count-btn:hover { border-color: #3F3F46; }
    .count-btn.on { background: #FAFAFA; border-color: #FAFAFA; color: #09090B; font-weight: 700; }

    .err { font-size: 11px; color: #EF4444; padding: 8px 10px; background: #1C0A0A; border: 1px solid rgba(239,68,68,0.2); border-radius: 7px; }

    .search-btn {
      width: 100%; height: 38px;
      background: #FAFAFA; border: none; border-radius: 8px;
      color: #09090B; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .search-btn:hover:not(:disabled) { opacity: .85; }
    .search-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* RESULTS */
    .results { border-top: 1px solid #1F1F23; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      border-bottom: 1px solid #1F1F23;
    }
    .stat { padding: 10px 8px; text-align: center; border-right: 1px solid #1F1F23; }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-bottom: 2px; }
    .stat-key { font-size: 9px; color: #52525B; letter-spacing: .06em; text-transform: uppercase; }

    .result-list { max-height: 260px; overflow-y: auto; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 99px; }

    .result-item { padding: 11px 14px; border-bottom: 1px solid #1A1A1C; }
    .result-item:last-child { border-bottom: none; }
    .r-name { font-size: 12px; font-weight: 600; color: #FAFAFA; margin-bottom: 2px; letter-spacing: -0.01em; }
    .r-cat { font-size: 10px; color: #52525B; margin-bottom: 5px; }
    .r-phone { font-size: 11px; color: #A1A1AA; margin-bottom: 5px; }
    .r-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .badge-no { font-size: 10px; font-weight: 600; color: #EF4444; background: #1C0A0A; border: 1px solid rgba(239,68,68,0.2); padding: 2px 7px; border-radius: 5px; }
    .badge-yes { font-size: 10px; font-weight: 600; color: #22C55E; background: #052E16; border: 1px solid rgba(34,197,94,0.2); padding: 2px 7px; border-radius: 5px; }
    .wa-link { font-size: 10px; font-weight: 600; color: #25D366; background: rgba(37,211,102,0.06); border: 1px solid rgba(37,211,102,0.2); padding: 2px 7px; border-radius: 5px; text-decoration: none; }
    .maps-link { font-size: 10px; font-weight: 500; color: #60A5FA; background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.2); padding: 2px 7px; border-radius: 5px; text-decoration: none; }

    /* LOADING */
    .loading { padding: 24px; text-align: center; color: #52525B; font-size: 12px; }
    .spinner { font-size: 18px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 8px; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* FOOTER */
    .footer { padding: 8px 14px; border-top: 1px solid #1A1A1C; display: flex; justify-content: space-between; align-items: center; }
    .footer-text { font-size: 10px; color: #3F3F46; }
    .footer-link { font-size: 10px; color: #52525B; text-decoration: none; }
    .footer-link:hover { color: #A1A1AA; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-sq">LS</div>
      LandSea
    </div>
    <a class="open-btn" href="https://leadsgenvib.vercel.app/dashboard" target="_blank">Open App ↗</a>
  </div>

  <div class="form">
    <div>
      <label class="field-label">Category</label>
      <div class="field-wrap">
        <select id="businessType">
          <option value="">Select type...</option>
          <option>Hotel</option><option>Restaurant</option><option>School</option>
          <option>Hospital</option><option>Clinic</option><option>Gym</option>
          <option>Salon</option><option>Pharmacy</option><option>Lawyer</option>
          <option>CA Accountant</option><option>Real Estate Agent</option>
          <option>Coaching Center</option><option>Dentist</option><option>Bakery</option>
          <option>Cafe</option><option>Mall</option><option>Medical Store</option>
          <option>Petrol Pump</option><option>Travel Agency</option><option>Bank</option>
        </select>
        <span class="arr">▾</span>
      </div>
    </div>
    <div>
      <label class="field-label">City</label>
      <div class="field-wrap">
        <input type="text" id="location" placeholder="e.g. Jaipur" />
      </div>
    </div>
    <div>
      <div class="count-lbl" style="display:block;margin-bottom:6px">Results</div>
      <div class="count-row" id="countRow"></div>
    </div>
    <div id="errorBox" style="display:none" class="err"></div>
    <button class="search-btn" id="searchBtn">Search Leads →</button>
  </div>

  <div id="results" class="results" style="display:none"></div>

  <div class="footer">
    <span class="footer-text">© 2025 LandSea </span>
    <a class="footer-link" href="https://leadsgenvib.vercel.app" target="_blank">leadsgenvib.vercel.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
